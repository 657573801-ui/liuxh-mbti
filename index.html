<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Segoe UI", system-ui, sans-serif; background: #0f0f1a; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
.bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08), transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(168,85,247,0.08), transparent 60%), radial-gradient(ellipse at 50% 0%, rgba(236,72,153,0.06), transparent 50%); }
.particle { position: fixed; width: 3px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 50%; animation: float linear infinite; z-index: 0; }
@keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
.container { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; padding: 20px 16px 60px; }
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.5s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.hero { text-align: center; padding: 40px 0; }
.hero h1 { font-size: 2rem; background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.hero p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 32px; }
.color-groups { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
.cg { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; text-align: center; font-size: 0.82rem; }
.btn { padding: 14px 36px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(99,102,241,0.45); }
.progress-wrap { margin-bottom: 20px; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a78bfa); border-radius: 3px; transition: width 0.4s; }
.progress-text { text-align: center; font-size: 0.8rem; color: #64748b; margin-top: 6px; }
.q-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 28px 20px; margin-bottom: 16px; }
.q-num { font-size: 0.78rem; color: #6366f1; font-weight: 700; margin-bottom: 8px; }

.q-opt:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.08); }

.nav-btns { display: flex; gap: 10px; margin-top: 18px; }
.nav-btn { flex: 1; padding: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: #e2e8f0; border-radius: 10px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
.nav-btn:hover { background: rgba(255,255,255,0.08); }
.result-hero { text-align: center; padding: 20px 0; }
.result-type { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.result-name { font-size: 1.2rem; color: #a5b4fc; margin-bottom: 2px; }

.color-badge { display: inline-block; padding: 5px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; margin-bottom: 20px; }

.dim-bar .dim-label { font-size: 0.72rem; color: #64748b; margin-bottom: 3px; }
.dim-bar .dim-val { font-size: 1.1rem; font-weight: 700; }
.section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.tag-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.tag { padding: 5px 14px; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.2); border-radius: 20px; font-size: 0.82rem; color: #a5b4fc; }
.sw-list { display: flex; flex-direction: column; gap: 10px; }
.sw-item { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 14px; font-size: 0.88rem; line-height: 1.6; border-left: 3px solid #6366f1; }
.sw-item.weak { border-left-color: #f87171; }
.sw-item .sw-label { font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.char-card { display: flex; gap: 14px; align-items: flex-start; background: rgba(255,255,255,0.03); border-radius: 14px; padding: 16px; border: 1px solid rgba(255,255,255,0.06); }
.char-avatar { width: 64px; height: 64px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(99,102,241,0.3); display: flex; align-items: center; justify-content: center; }
.char-info h4 { font-size: 0.95rem; margin-bottom: 2px; }
.char-info .anime { font-size: 0.78rem; color: #64748b; margin-bottom: 8px; }
.char-info .story { font-size: 0.84rem; line-height: 1.7; color: #cbd5e1; margin-bottom: 8px; }
.char-info .quote { font-size: 0.84rem; color: #a78bfa; font-style: italic; }
.all-types { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
.at-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 0.75rem; }
.at-item:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.08); }
.at-item .at-type { font-weight: 700; margin-bottom: 2px; }
.at-item .at-name { font-size: 0.68rem; color: #94a3b8; }
.action-btns { display: flex; gap: 10px; margin-top: 24px; justify-content: center; }
.action-btn { padding: 12px 24px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: #e2e8f0; border-radius: 10px; cursor: pointer; font-size: 0.88rem; transition: all 0.2s; }
.action-btn:hover { background: rgba(255,255,255,0.08); }
.action-btn.primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; }
</style>

<script>

    var sh = ""; t.strengths.forEach(function(s){ var p = s.split("，")[0] || s; sh += "<div class=\"sw-item\"><div class=\"sw-label\">✦ " + p + "</div><div>" + s + "</div></div>"; });
    var wh = ""; t.weaknesses.forEach(function(w){ var p = w.split("，")[0] || w; wh += "<div class=\"sw-item weak\"><div class=\"sw-label\">⚠ " + p + "</div><div>" + w + "</div></div>"; });
    var ah = ""; Object.keys(window.TYPES).forEach(function(k2){ var tt = window.TYPES[k2]; var cc = window.CG[tt.group]; ah += "<div class=\"at-item\" onclick=\"showResult(\"" + k2 + "\",calcScores(\"" + k2 + "\"))\" style=\"border-color:" + cc.c + "44\"><div class=\"at-type\" style=\"color:" + cc.c + "\">" + k2 + "</div><div class=\"at-name\">" + tt.name + "</div></div>"; });
    var cav = av.replace("100 100","64 64").replace('r="48"','r="30"').replace("92","60").replace(/8px/g,"5px");
    pageR.innerHTML =
      "<div class=\"result-hero\"><div class=\"result-avatar\">" + av + "</div>" +
      "<div class=\"result-type\">" + typeKey + "</div>" +
      "<div class=\"result-name\">" + t.name + " · " + t.traits.join(" · ") + "</div>" +
      "<div class=\"result-alias\">" + t.alias + " · " + cg.n + "</div>" +
      "<div class=\"color-badge\" style=\"background:" + cg.bg + ";color:" + cg.c + ";border:1px solid " + cg.c + "44\">" + cg.n + " — " + cg.d + "</div></div>" +
      "<div class=\"result-dims\">" + db + "</div>" +
      "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">✦</span>核心优势</div><div class=\"sw-list\">" + sh + "</div></div>" +
      "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠</span>潜在短板</div><div class=\"sw-list\">" + wh + "</div></div>" +
      "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">★</span>动漫代表人物</div><div class=\"char-card\"><div class=\"char-avatar\">" + cav + "</div><div class=\"char-info\"><h4>" + t.char + "</h4><div class=\"anime\">" + t.charAnime + "</div><div class=\"story\">" + t.charStory + "</div><div class=\"quote\">「" + t.charQuote + "」</div></div></div></div>" +
      "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">◈</span>16型人格速览</div><div class=\"all-types\">" + ah + "</div></div>" +
      "<div class=\"action-btns\"><button class=\"action-btn primary\" onclick=\"startTest()\">重新测试</button><button class=\"action-btn\" onclick=\"shareR()\">分享结果</button></div>";
    pageR.scrollIntoView({behavior:"smooth"});
  };

  window.calcScores = function(k) {
    var s = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    if (k[0] === "E") { s.E = 10; s.I = 4; } else { s.I = 10; s.E = 4; }
    if (k[1] === "S") { s.S = 10; s.N = 4; } else { s.N = 10; s.S = 4; }
    if (k[2] === "T") { s.T = 10; s.F = 4; } else { s.F = 10; s.T = 4; }
    if (k[3] === "J") { s.J = 10; s.P = 4; } else { s.P = 10; s.J = 4; }
    return s;
  };

  window.shareR = function() {
    var typeKey = document.querySelector(".result-type").textContent.trim();
    var t = window.TYPES[typeKey];
    var text = "[MBTI测试结果] " + typeKey + " " + t.name + " — " + t.traits.join(" · ") + " " + location.href;
    if (navigator.share) { navigator.share({title:"MBTI测试结果",text:text,url:location.href}).catch(function(){}); }
    else { navigator.clipboard.writeText(text).then(function(){alert("结果已复制！");}).catch(function(){alert(text);}); }
  };

  (function() {
    var c = document.getElementById("particles");
    if (!c) return;
    for (var i = 0; i < 25; i++) {
      var p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "%";
      p.style.animationDuration = (8 + Math.random() * 14) + "s";
      p.style.animationDelay = (Math.random() * 10) + "s";
      p.style.opacity = (0.1 + Math.random() * 0.2) + "";
      c.appendChild(p);
    }
  })();
})();
</script>
</body>
</html>
